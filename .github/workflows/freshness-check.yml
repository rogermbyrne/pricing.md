name: Weekly Pricing Freshness Check

on:
  schedule:
    # Every Sunday at 3:07 AM UTC (off-minute to avoid :00 stampede)
    - cron: '7 3 * * 0'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  check-freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npx tsc

      - name: Run freshness check & update verified dates
        run: npx tsx scripts/update-verified-dates.ts

      - name: Validate after updates
        run: npx tsx scripts/validate.ts

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet data/tools/; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "$(git diff --stat data/tools/)" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Commit verified date updates
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/tools/
          git commit -m "chore: update lastVerified dates (weekly freshness check)

          Automated weekly check confirmed pricing pages unchanged.
          Tools with detected changes logged in pending-changes.txt."
          git push

      - name: Report changes needing review
        if: hashFiles('data/pending-changes.txt') != ''
        run: |
          echo "## Pricing Changes Detected" >> "$GITHUB_STEP_SUMMARY"
          echo "The following tools have changed pricing pages and need manual review:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          while read -r id; do
            echo "- \`$id\`" >> "$GITHUB_STEP_SUMMARY"
          done < data/pending-changes.txt
